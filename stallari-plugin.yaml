name: gmail-blade-mcp
version: "0.2.1"
description: "Gmail email operations via Google API — search, read, send, threads, labels, drafts, filters"
author: piersdd
license: MIT
tier: certified
homepage: https://github.com/piersdd/gmail-blade-mcp
contract: email-v1

services:
  email:
    search: gmail_search
    read: gmail_read
    mailboxes: gmail_mailboxes
    snippets: gmail_snippets
    threads: gmail_thread
    state: gmail_state
    changes: gmail_changes
    bulk: gmail_bulk
    send: gmail_send
    reply: gmail_reply
    flag: gmail_flag
    move: gmail_move
    delete: gmail_delete

install:
  runtime: uv
  package: gmail-blade-mcp
  command: gmail-blade-mcp

env:
  - name: GMAIL_WRITE_ENABLED
    description: "Enable write operations (send, reply, flag, move, delete)"
    default: "false"
  - name: GOOGLE_API_KEY
    description: "Google AI Studio API key for Gemini classify/summarise tools"
    secret: true

requires:
  sidereal: ">=0.3.0"

  adapter_contracts:
    - "email >= 1.0"
inference:
  provider: google-gemini
  model: gemini-3.1-flash-lite
  purpose: "classification, summarisation"

conformance:
  required: "3/3"
  recommended: "2/2"
  optional: "3/3"
  last_tested: "2026-03-27"

# DD-338 A.2.dom — per-record domain_hint patterns surface.
# Ships empty by default; the user populates via the in-app consent UI
# (DomainConsentView, stallari-harness v0.99.29.0) which writes to
# <state-root>/blade-config/gmail-blade-mcp/config.yaml.
# The blade's read tools (gmail_search, gmail_snippets, gmail_read,
# gmail_thread) emit domain_hints: {message_id: domain} in the _meta
# envelope when matched (Convention #22 graceful degradation: missing /
# empty config ⇒ key absent).
blade_domain_hint_patterns:
  patterns: []
